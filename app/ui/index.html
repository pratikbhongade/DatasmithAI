<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataSmith AI</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css?v=2">
</head>
<body class="bg-gray-50 h-screen flex flex-col font-sans text-gray-800">

    <!-- Header -->
    <header class="bg-white border-b border-gray-200 py-4 px-6 flex justify-between items-center shrink-0">
        <h1 class="text-xl font-semibold text-indigo-600 flex items-center gap-2">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            DataSmith AI
        </h1>
        <span class="text-sm text-gray-500" id="cost-display">Total Cost: $0.00</span>
    </header>

    <!-- Chat Area -->
    <main class="flex-1 overflow-y-auto p-4 md:p-6 w-full max-w-4xl mx-auto flex flex-col gap-6" id="chat-container">
        
        <!-- Welcome Message -->
        <div class="flex flex-col items-start gap-1 w-full max-w-2xl">
            <div class="bg-white border border-gray-200 rounded-2xl p-4 shadow-sm">
                <p class="text-sm">Hey! I'm DataSmith AI. Drop a PDF, an image, or some audio in here, and let's get to work.</p>
            </div>
        </div>

    </main>

    <!-- Input Area -->
    <footer class="bg-white border-t border-gray-200 p-4 shrink-0">
        <form id="chat-form" class="max-w-4xl mx-auto relative flex flex-col gap-2">
            
            <!-- File Preview Area -->
            <div id="file-preview" class="hidden flex items-center gap-2 text-sm text-gray-600 bg-gray-100 p-2 rounded-lg w-max">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"></path></svg>
                <span id="file-name" class="font-medium truncate max-w-[200px]"></span>
                <button type="button" id="remove-file-btn" class="text-gray-400 hover:text-red-500">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>

            <div class="relative flex items-end gap-2 bg-white rounded-2xl border border-gray-300 shadow-sm focus-within:border-indigo-500 focus-within:ring-1 focus-within:ring-indigo-500 p-2 transition-all">
                
                <input type="file" id="file-input" class="hidden" accept=".pdf,image/*,audio/*">
                <button type="button" id="upload-btn" class="p-2 text-gray-400 hover:text-indigo-600 rounded-full hover:bg-gray-100 transition-colors" title="Upload Image, PDF, or Audio">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"></path></svg>
                </button>

                <textarea id="text-input" rows="1" placeholder="Type a message or paste a YouTube link..." class="w-full resize-none border-none focus:ring-0 p-2 text-sm max-h-32 bg-transparent" style="min-height: 40px;"></textarea>
                
                <button type="submit" id="send-btn" class="p-2 text-white bg-indigo-600 hover:bg-indigo-700 rounded-full transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                </button>
            </div>
        </form>
    </footer>

    <!-- Template for Message -->
    <template id="message-template">
        <div class="flex flex-col gap-1 w-full message-container">
            <!-- Details / Logs (Only for AI) -->
            <details class="logs-details hidden mb-1 text-xs text-gray-500 group self-start">
                <summary class="cursor-pointer hover:text-gray-700 flex items-center gap-1">
                    <svg class="w-3 h-3 transition-transform group-open:rotate-90" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    Execution Logs & Cost
                </summary>
                <div class="pl-4 mt-1 space-y-1 border-l-2 border-gray-200 logs-content font-mono bg-gray-50 p-2 rounded">
                </div>
            </details>

            <!-- Extracted Text (Only for AI) -->
            <details class="extracted-details hidden mb-1 text-xs text-gray-500 group self-start">
                <summary class="cursor-pointer hover:text-gray-700 flex items-center gap-1">
                    <svg class="w-3 h-3 transition-transform group-open:rotate-90" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    View Extracted Text
                </summary>
                <div class="pl-4 mt-1 border-l-2 border-gray-200 font-mono bg-gray-50 p-2 rounded whitespace-pre-wrap max-h-60 overflow-y-auto extracted-content">
                </div>
            </details>
            
            <div class="message-bubble p-4 shadow-sm text-sm whitespace-pre-wrap"></div>
        </div>
    </template>

    <script src="/static/app.js?v=2"></script>
</body>
</html>
